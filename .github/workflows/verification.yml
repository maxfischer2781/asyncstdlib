name: Static Checks
permissions: {}

on:
  push:
  pull_request:
  schedule:
    - cron: '0 10 * * 3,6'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[test,typetest]
    - name: Lint with flake8
      run: |
        flake8 asyncstdlib unittests
    - name: Format with black
      run: |
        black asyncstdlib unittests --diff --check
    - name: Verify with MyPy
      run: |
        mypy --pretty
    - name: Verify with PyRight
      uses: jakebailey/pyright-action@8ec14b5cfe41f26e5f41686a31eb6012758217ef
